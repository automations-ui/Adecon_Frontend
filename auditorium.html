<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adecon 2026 - Auditorium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', Arial, sans-serif; }

html, body {
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    overscroll-behavior: none;
}

/* 🔐 Loader */
#loader {
    position:fixed;
    inset:0;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.spinner {
    width:40px;
    height:40px;
    border:4px solid rgba(255,255,255,0.1);
    border-top:4px solid #38bdf8;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 🔄 Rotate Screen Overlay */
#rotateScreen {
    position: fixed;
    inset: 0;
    background: #020617;
    color: #fff;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    text-align: center;
}
#rotateScreen i { font-size: 50px; color: #38bdf8; margin-bottom: 20px; animation: pulse 2s infinite; }

/* 🎥 VIDEO CONTAINER */
.video-container {
    width:100vw;
    height:100vh;
    height:100dvh; /* Dynamic viewport height fix */
    position:relative;
    overflow: hidden;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
}

#videoPlayer {
    width:100%;
    height:100%;
    display: block;
    /* 'contain' ensures the full slide/frame is visible without cropping */
    object-fit: contain; 
    background:black;
    z-index: 10;
}
#fallbackImage {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill; /* fills entire screen */
    z-index: 5;
    display: none;
    background: black;
}

#videoPlayer.hidden {
    display: none;
}
/* 📄 Modal */
.modal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.modal-content {
    width:90%;
    height:85%;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    position:relative;
}

.modal-content iframe { width:100%; height:100%; border:none; }

.close-btn {
    position:absolute;
    top:10px;
    right:15px;
    background:#ef4444;
    color:#fff;
    border:none;
    padding:7px 10px;
    cursor:pointer;
    font-weight: bold;
    border-radius: 6px;
    z-index: 1001;
}

/* 📱 Footer Bar */
.footer-bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
   border-top: 1px solid rgba(0,0,0,0.1);
    z-index: 100;
}
.footer-bar.collapsed { transform: translateY(100%); }

.footer-toggle {
    position: absolute;
    top: -35px;
    left: 50%;
    transform: translateX(-50%);
    background: #2a4d7d;
    color: white;
    padding: 6px 20px;
    border-radius: 12px 12px 0 0;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
}

.component-bar {
    display: flex;
    justify-content: space-around;
    padding: 12px 0 25px 0;
}

.component-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    color: #444;
    font-size: 11px;
    flex: 1;
}

.component-item i { font-size: 22px; margin-bottom: 4px; color: #2a4d7d; }

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}
</style>
</head>

<body>

<div id="rotateScreen">
    <i class="fa-solid fa-rotate"></i>
    <h2>Rotate Your Device</h2>
    <p style="margin-top:10px; opacity:0.8;">Landscape mode recommended for the best view.</p>
</div>

<div id="loader">
    <div class="spinner"></div>
</div>

<div class="video-container" id="mainLayout">
    <img id="fallbackImage"
     src="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/Auditorium+with+banner_1.png"
     style="display:none;" />
    <video id="videoPlayer" muted autoplay playsinline controlsList="nodownload"></video>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <iframe id="modalFrame"></iframe>
    </div>
</div>

<div class="footer-bar collapsed" id="footerBar">
    <div class="footer-toggle" id="footerToggle">Menu ▲</div>
    <div class="component-bar">
        <div class="component-item" id="goLobby"><i class="fa-solid fa-house"></i>Lobby</div>
        <div class="component-item" id="goAud"><i class="fa-solid fa-person-chalkboard"></i>Auditorium</div>
        <div class="component-item" id="goEx"><i class="fa-solid fa-landmark"></i>Exhibition</div>
        <div class="component-item" id="askBtn"><i class="fa-regular fa-comment"></i>Ask</div>
        <div class="component-item" id="logout"><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</div>
    </div>
</div>

<script>
/* 📱 Orientation & UI */
function checkOrientation() {
    const isPortrait = window.innerHeight > window.innerWidth;
    const isMobile = window.innerWidth < 1024;
    
    const rotateOverlay = document.getElementById("rotateScreen");
    const mainLayout = document.getElementById("mainLayout");

    if (isMobile && isPortrait) {
        rotateOverlay.style.display = "flex";
        mainLayout.style.visibility = "hidden";
    } else {
        rotateOverlay.style.display = "none";
        mainLayout.style.visibility = "visible";
        
        // Ensure layout recalculates on rotation
        window.scrollTo(0, 0);
    }
}
async function checkStreamLive() {
    try {
        const res = await fetch(
            "https://stream.mux.com/6uwusJNZiVwtBChnLfrmOnUzXEft4AjBT5GumyCu8U8.m3u8",
            { method: "GET" }
        );

        const text = await res.text();

        try {
            const data = JSON.parse(text);

            if (
                data?.error?.type === "live_stream_inactive"
            ) {
                return false; 
            }
        } catch {
     
        }

        return true;

    } catch (err) {
     
        return false;
    }
}
/* 📊 Analytics */
function trackAuditoriumView() {
    fetch("https://adecon-backend-8y4v.onrender.com/api/user/activity", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email:localStorage.getItem('email'),viewTime: true }),
        credentials: "include"
    }).catch(() => {});
}

/* 🔐 Auth Status */
async function checkAuth() {
   if(localStorage.getItem("email")) {
            document.getElementById("loader").style.display = "none";
            return true;
}
else{
    window.location.replace("login.html");
    return false;
}
}

/* 🎥 Video Engine */
function setupVideo() {
    const video = document.getElementById('videoPlayer');
    const src = "https://stream.mux.com/6uwusJNZiVwtBChnLfrmOnUzXEft4AjBT5GumyCu8U8.m3u8";

    if (Hls.isSupported()) {
        const hls = new Hls({
            liveSyncDurationCount: 3,
            maxBufferLength: 10,
        });
        hls.loadSource(src);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {
            // Handle autoplay block: show a play button if needed or keep muted
            console.log("Autoplay requires interaction");
        }));
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = src;
    }
    
    // Auto-pause to save data/bandwidth when tab is hidden
    document.addEventListener("visibilitychange", () => {
        if (document.hidden) video.pause(); else video.play();
    });
}

/* 📄 Interactions */
function openModal(url) {
    document.getElementById("modalFrame").src = url;
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("modalFrame").src = "";
}

function buildFormURL() {
    const encode = k => encodeURIComponent(localStorage.getItem(k) || "");
    return `https://docs.google.com/forms/d/e/1FAIpQLSfe6pbQgIeUB9IuiiJ-vq6xpTIcpMSxiOIyhk8MI-2H8RbjYw/viewform?usp=pp_url&entry.543970567=${encode("fullname")}&entry.385469749=&entry.57364819=${encode("mobileno")}&entry.880130637=${encode("email")}&entry.342698872=${encode("city")}&entry.745321921=${encode("state")}&entry.1903990537=${encode("country")}`;
}
function showFallback() {
    const img = document.getElementById("fallbackImage");
    const video = document.getElementById("videoPlayer");

if (img) {
        img.style.display = "block";
    }
    if (video) {
        video.classList.add("hidden");
    }
}
/* 🚀 Initialization */
document.addEventListener("DOMContentLoaded", async () => {
    if (!await checkAuth()) return;

   
const isLive = await checkStreamLive();

    if (isLive) {
         trackAuditoriumView();
        setupVideo();
    } else {
        showFallback();
    }
     document.getElementById("loader").style.display = "none";

    // Footer Logic
    const footer = document.getElementById("footerBar");
    const toggle = document.getElementById("footerToggle");
    toggle.onclick = () => {
        footer.classList.toggle("collapsed");
        toggle.textContent = footer.classList.contains("collapsed") ? "Menu ▲" : "Menu ▼";
    };

    document.getElementById("askBtn").onclick = () => openModal(buildFormURL());
    document.getElementById("goLobby").onclick = () => location.href = "home.html";
    document.getElementById("goAud").onclick = () => location.href = "auditorium.html";
    document.getElementById("goEx").onclick = () => location.href = "exhibition.html";

    document.getElementById("logout").onclick = async () => {
 
        localStorage.clear();
        window.location.href = "login.html";
    };

    window.addEventListener("resize", checkOrientation);
    window.addEventListener("orientationchange", () => {
        setTimeout(checkOrientation, 300);
    });
    checkOrientation();
});

window.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
</script>

</body>
</html>
