<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; font-family: Arial, sans-serif; }

.container {
  position: relative;
  width: 100vw;
  height: 100vh;
}

.container img {
  width:100%;
  height:100%;
  object-fit:cover;
  image-rendering: auto;
}

/* Red dot */
.click-dot {
  position:absolute;
  width:16px;
  height:16px;
  background:red;
  border-radius:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}

@keyframes pulse {
  0% { transform:scale(1) translate(-50%,-50%); }
  50% { transform:scale(1.5) translate(-50%,-50%); }
  100% { transform:scale(1) translate(-50%,-50%); }
}

/* PDF Modal */
.pdf-modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.pdf-content {
  width:80%;
  height:80%;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  position:relative;
}

.pdf-content iframe {
  width:100%;
  height:100%;
  border:none;
}

.close-btn {
  position:absolute;
  top:10px;
  right:15px;
  background:red;
  color:#fff;
  border:none;
  padding:5px 10px;
  cursor:pointer;
}

/* Ask Popup */
#questionPopup {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 320px;
  background: white;
  border-radius: 10px;
  padding: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.25);
  display: none;
  z-index: 1000;
}

#questionPopup textarea {
  width: 100%;
  height: 80px;
  padding: 8px;
}

.popup-buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.popup-buttons button {
  width: 48%;
  padding: 8px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

#sendQuery { background:#2a4d7d; color:white; }
#cancelQuery { background:#ccc; }
</style>
</head>

<body>

<div class="container">
  <img
    id="mainImage"
    src="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/Lobby+design+with+agenda.png"
    usemap="#image-map"
  />

  <map name="image-map">
    <area href="exhibition.html" coords="2000,6599,7037,9495" shape="rect">
    <area href="auditorium_recorded.html" coords="10050,5468,16640,9213" shape="rect">
    <area href="exhibition.html" coords="18923,6481,24643,9472" shape="rect">

    <area  class="agenda-area"
      data-pdf-url="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/USERGUIDE+ADECON.pdf"
      coords="7555,11497,9791,13310" shape="rect">

    <area class="agenda-area"
      data-pdf-url="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/USERGUIDE+ADECON.pdf"
      coords="16970,11356,18994,13098" shape="rect">

    <!-- ✅ Ask Question Area -->
    <area id="askArea" coords="10238,9660,16264,12604" shape="rect">
  </map>
</div>

<!-- PDF Modal -->
<div class="pdf-modal" id="pdfModal">
  <div class="pdf-content">
    <button class="close-btn" onclick="closePDF()">✖</button>
    <iframe id="pdfFrame"></iframe>
  </div>
</div>

<!-- Ask Question Popup -->
<div id="questionPopup">
  <textarea id="userQuery" placeholder="Ask your question..."></textarea>
  <div class="popup-buttons">
    <button id="sendQuery">Send</button>
    <button id="cancelQuery">Cancel</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>

<script>
if (localStorage.getItem("_loginS") !== "_ltorguien") {
  window.location.href = "login.html";
}

/* PDF */
function openPDF(url) {
  document.getElementById("pdfFrame").src = url;
  document.getElementById("pdfModal").style.display = "flex";
}
function closePDF() {
  document.getElementById("pdfModal").style.display = "none";
  document.getElementById("pdfFrame").src = "";
}

function attachAgendaHandlers() {
  document.querySelectorAll("area.agenda-area").forEach(area => {
    area.addEventListener("click", e => {
      e.preventDefault();
      openPDF(area.dataset.pdfUrl);
    });
  });
}

/* Ask Feature */
function setupAskFeature() {
  const askArea = document.getElementById("askArea");
  const popup = document.getElementById("questionPopup");
  const sendBtn = document.getElementById("sendQuery");
  const cancelBtn = document.getElementById("cancelQuery");
  const input = document.getElementById("userQuery");

  askArea.addEventListener("click", e => {
    e.preventDefault();
    popup.style.display = "block";
  });

  cancelBtn.onclick = () => {
    popup.style.display = "none";
    input.value = "";
  };

  sendBtn.onclick = () => {
    const query = input.value;

    if (!query.trim()) {
      alert("Please enter a question");
      return;
    }

    // loader
    sendBtn.disabled = true;
    const originalText = sendBtn.textContent;
    sendBtn.textContent = "Sending...";

    fetch("https://adecon-backend.onrender.com/api/query/add", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user: localStorage.getItem('userEmail'),
        query: query
      })
    })
    .then(res => res.json())
    .then(() => {
      alert("Question sent!");
      popup.style.display = "none";
      input.value = "";
    })
    .catch(() => alert("Error sending"))
    .finally(() => {
      sendBtn.disabled = false;
      sendBtn.textContent = originalText;
    });
  };
}

/* Red dots */
function addStaticDots() {
  const container = document.querySelector(".container");

  const dotPositions = [
    { x: 400, y: 335 },
    { x: 750, y: 350 },
    { x: 1400, y: 335 },
    { x: 500, y: 680 },
    { x: 1025, y: 675 },
    { x: 760, y: 600 }
  ];

  dotPositions.forEach(pos => {
    const dot = document.createElement("div");
    dot.className = "click-dot";
    dot.style.left = pos.x + "px";
    dot.style.top = pos.y + "px";
    container.appendChild(dot);
  });
}

document.addEventListener("DOMContentLoaded", () => {
  attachAgendaHandlers();
  setupAskFeature();
  addStaticDots();
});

window.onload = function() {
  imageMapResize();
};

</script>

</body>
</html>
