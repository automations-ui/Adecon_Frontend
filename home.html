<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Adecon 2026 - Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; font-family: Arial, sans-serif; }

/* 🔐 Loader */
#authLoader {
  position:fixed;
  inset:0;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  color:white;
}
area {
  cursor: pointer;
}
.spinner {
  width:50px;
  height:50px;
  border:5px solid rgba(255,255,255,0.2);
  border-top:5px solid #38bdf8;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Main */
.container {
  position: relative;
  width: 100vw;
  height: 100vh;
}

.container img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Modal */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.modal-content {
  width:85%;
  height:85%;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  position:relative;
}

.modal-content iframe {
  width:100%;
  height:100%;
  border:none;
}

.close-btn {
  position:absolute;
  top:10px;
  right:15px;
  background:red;
  color:#fff;
  border:none;
  padding:6px 12px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔐 Loader -->
<div id="authLoader">
  <div style="text-align:center;">
    <div class="spinner"></div>
    <p style="margin-top:10px; opacity:0.8;">Authenticating...</p>
  </div>
</div>

<!-- 🌐 Main UI -->
<div class="container">
  <img
    src="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/Lobby+Design_2.png"
    usemap="#image-map"
  />

  <map name="image-map">

    <!-- Exhibition -->
    <area href="exhibition.html" coords="193,400,720,750" shape="rect">

    <!-- Auditorium -->
    <area href="auditorium.html" coords="1185,400,1730,750" shape="rect">

    <!-- Day 1 Agenda -->
    <area class="agenda-area"
      data-url="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/Agenda+DAy+1.pdf"
      coords="554,880,707,1025" shape="rect">

    <!-- Day 2 Agenda -->
    <area class="agenda-area"
      data-url="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/Agenda+DAy+2.pdf"
      coords="1219,865,1361,1025" shape="rect">

    <!-- Help Desk -->
    <area id="askArea" coords="768,670,1161,950" shape="rect">

  </map>
</div>

<!-- 📄 Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">✖</button>
    <iframe id="modalFrame"></iframe>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>

<script>

/* 🔐 AUTH */
async function checkAuth() {
  try {
    const res = await fetch("https://adecon-backend-8y4v.onrender.com/api/auth/status", {
      credentials: "include"
    });

    const data = await res.json();

    if (data.message === "User authenticated") {
      hideLoader();
      return true;
    } else {
      redirectToLogin();
    }
  } catch {
    redirectToLogin();
  }
}

function hideLoader() {
  document.getElementById("authLoader").style.display = "none";
}

function redirectToLogin() {
  window.location.href = "login.html";
}

/* 📄 Modal */
function openModal(url) {
  const modal = document.getElementById("modal");
  const frame = document.getElementById("modalFrame");

  frame.src = url;
  modal.style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("modalFrame").src = "";
}

/* Agenda */
function attachAgendaHandlers() {
  document.querySelectorAll("area.agenda-area").forEach(area => {
    area.addEventListener("click", e => {
      e.preventDefault();
      openModal(area.dataset.url);
    });
  });
}

/* 🧠 Build Prefilled Google Form URL */
function buildPrefilledFormURL() {
  const email = encodeURIComponent(localStorage.getItem("email") || "");
  const fullname = encodeURIComponent(localStorage.getItem("fullname") || "");
  const mobileno = encodeURIComponent(localStorage.getItem("mobileno") || "");
  const city = encodeURIComponent(localStorage.getItem("city") || "");
  const state = encodeURIComponent(localStorage.getItem("state") || "");
  const country = encodeURIComponent(localStorage.getItem("country") || "");

  return `https://docs.google.com/forms/d/e/1FAIpQLSfe6pbQgIeUB9IuiiJ-vq6xpTIcpMSxiOIyhk8MI-2H8RbjYw/viewform?usp=pp_url
  &entry.543970567=${fullname}
  &entry.385469749=
  &entry.57364819=${mobileno}
  &entry.880130637=${email}
  &entry.342698872=${city}
  &entry.745321921=${state}
  &entry.1903990537=${country}`.replace(/\s+/g, "");
}

/* Help Desk */
function setupAskFeature() {
  const askArea = document.getElementById("askArea");

  askArea.addEventListener("click", e => {
    e.preventDefault();
    const url = buildPrefilledFormURL();
    openModal(url);
  });
}

/* ESC close */
window.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

/* INIT */
document.addEventListener("DOMContentLoaded", async () => {
  const isAuth = await checkAuth();
  if (!isAuth) return;

  attachAgendaHandlers();
  setupAskFeature();
});

/* Responsive fix */
window.onload = function() {
  imageMapResize();
};

</script>

</body>
</html>
