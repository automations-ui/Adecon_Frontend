<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auditorium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- HLS.js library for M3U8 playback -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html { width:100%; height:100%; overflow:hidden; font-family: Arial, sans-serif; position: relative; }

    .container { width:100%; height:100vh; position: relative; }

    .container img.background {
        width:100%;
        height:100%;
        object-fit: cover;
        display:block;
    }

    #videoPlayer {
        position:absolute;
        display:none;
        z-index:2;
        border:2px solid #fff;
        box-shadow:0 0 10px rgba(0,0,0,0.5);
        background:black;
    }

    .footer-container {
        position:absolute;
        bottom:0;
        left:50%;
        transform:translateX(-50%);
        z-index:5;
    }

    .footer-container img {
        max-width:700px;
        width:100%;
        height:50px;
        display:block;
    }
</style>
</head>

<body>

<div class="container">
    <!-- Background Image -->
    <img src="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/auditorium.png" usemap="#image-map" class="background">

    <!-- Main Video Area -->
    <map name="image-map">
        <area coords="420,230,1120,1000" shape="rect" id="videoArea">
    </map>

    <video id="videoPlayer" controls autoplay muted></video>

    <!-- Footer Image -->
    <div class="footer-container">
        <img src="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/footer.jpg" usemap="#footer-map" alt="Footer" id="footerImage">
        <map name="footer-map">
            <area coords="7,15,117,163" href="home.html" shape="rect">
            <area coords="250,10,433,160" href="auditorium_live.html" shape="rect">
            <area coords="525,11,701,162" href="exhibition.html" shape="rect">
            <area coords="734,6,994,161" href="https://docs.google.com/forms/" target="_blank" shape="rect">
            <area coords="1039,6,1182,164" href="#" id="logoutArea" shape="rect">
        </map>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>
<script>
window.onload = function () {
    const loginStatus = localStorage.getItem('_loginS');
    if (loginStatus !== '_ltorguien') {
        window.location.href = "login.html";
        return;
    }

    imageMapResize(); // make maps responsive
    setupVideo();
};

// Setup main video
function setupVideo() {
    const videoPlayer = document.getElementById('videoPlayer');
    const videoArea = document.getElementById('videoArea');
    const containerImg = document.querySelector('.container img.background');

    function scaleCoords() {
        const coords = videoArea.coords.split(',').map(Number);
        const scaleX = containerImg.width / containerImg.naturalWidth;
        const scaleY = containerImg.height / containerImg.naturalHeight;
        return coords.map((c, i) => i % 2 === 0 ? c * scaleX : c * scaleY);
    }

    function positionVideo() {
        const [x1, y1, x2, y2] = scaleCoords();
        videoPlayer.style.left = x1 + 'px';
        videoPlayer.style.top = y1 + 'px';
        videoPlayer.style.width = (x2 - x1) + 'px';
        videoPlayer.style.height = (y2 - y1) + 'px';
        videoPlayer.style.display = 'block';
    }

    positionVideo();

    const videoSrc = 'https://stream.mux.com/u9qwafNMD2Gv7jO6Q17OCrhb7IDkSsL5MSjr36fcLao.m3u8';

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(videoPlayer);
        hls.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play());
    } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
        videoPlayer.src = videoSrc;
        videoPlayer.play();
    }

    window.addEventListener('resize', positionVideo);
}

// Logout functionality
const logoutArea = document.getElementById('logoutArea');
logoutArea.addEventListener('click', function(e){
    e.preventDefault();
    localStorage.removeItem('_loginS');
    window.location.href = "login.html";
});
</script>

</body>
</html>
