<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        display: flex;
        height: 100vh;
    }

    .hero {
        flex: 2;
        background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center/cover;
    }

    .login-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f5f5f5;
    }

    .login-box {
        background: white;
        padding: 40px;
        width: 300px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        text-align: center;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #0056b3;
    }

    .register-btn {
        background: #28a745;
    }

    .register-btn:hover {
        background: #1e7e34;
    }

    .error {
        color: red;
        font-size: 14px;
        display: none;
    }
</style>
</head>

<body>

<div class="hero"></div>

<div class="login-container">
    <div class="login-box">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Enter your email" />
        <div class="error" id="errorMsg"></div>
        <button onclick="login()">Login</button>

        <button class="register-btn" onclick="register()">Register</button>
    </div>
</div>

<script>

// 🔁 Auto-login check
window.onload = function () {
    const loginStatus = localStorage.getItem('_loginS');
    if (loginStatus === '_ltorguien') {
        window.location.href = "home.html";
    }
};
async function login() {
    const email = document.getElementById('email').value.trim();
    const errorMsg = document.getElementById('errorMsg');

    // ✅ Validation
    if (!email || !email.includes('@')) {
        errorMsg.style.display = 'block';
        errorMsg.innerText = "Please enter a valid email";
        return;
    }

    errorMsg.style.display = 'none';

    let userEmail = email;
    let isAuthenticated = false;

    try {
        // 🔥 STEP 1: NEW API (Your backend)
        try {
            const res1 = await fetch("https://adecon-backend.onrender.com/api/payment/status", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email })
            });

            const data1 = await res1.json();
            console.log("New API Response:", data1);

            if (data1.paymentStatus && data1.paymentStatus !== "payment not done") {
                isAuthenticated = true;
            }
        } catch (err) {
            console.warn("New API failed, trying fallback...");
        }

        // 🔥 STEP 2: FALLBACK API (old one)
        if (!isAuthenticated) {
            try {
                const res2 = await fetch("https://sapi.onference.in/UsersApi/checkPaymentStatus", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email })
                });

                const data2 = await res2.json();
                console.log("Fallback API Response:", data2);

                if (data2.paymentStatus && data2.paymentStatus !== "payment not done") {
                    isAuthenticated = true;

                    if (data2.userData && data2.userData.length > 0) {
                        userEmail = data2.userData[0].email;
                    }
                }
            } catch (err) {
                console.warn("Fallback API also failed");
            }
        }

        // ✅ STEP 3: FINAL DECISION
        if (isAuthenticated) {

            // Save login flag
            localStorage.setItem('_loginS', '_ltorguien');
            localStorage.setItem('userEmail', userEmail);

            // 🔥 Activity tracking
            try {
                await fetch("https://adecon-backend.onrender.com/api/user/activity", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        user: userEmail,
                        loginTime: true
                    })
                });
            } catch (err) {
                console.error("Tracking failed:", err);
            }

            // Redirect to home
            window.location.href = "home.html";

        } else {
            // ❌ BOTH FAILED → redirect
            window.location.href = "https://adecon2026-registration.onrender.com/";
        }

    } catch (error) {
        console.error("Error:", error);
        errorMsg.style.display = 'block';
        errorMsg.innerText = "Unable to verify payment. Try again.";
    }
}

// ✅ Register redirect
function register() {
    window.location.href = "https://adecon2026-registration.onrender.com/";
}

</script>

</body>
</html>
