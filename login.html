<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adecon 2026 - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

html, body {
    height: 100%;
}

/* MAIN LAYOUT */
body {
    display: flex;
    flex-direction: column;
    min-height: 100%;
    background: #f4f7fb;
}

/* HERO IMAGE */
.hero {
    width: 100%;
    height: 220px;
}

.hero img {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
}

/* LOGIN */
.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px 15px;
}

.login-box {
    width: 100%;
    max-width: 320px;
    min-width: 260px;
    padding: 40px 30px;
    border-radius: 16px;
    background: #fff;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    text-align: center;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #f9fbfd;
}

input:focus {
    border-color: #0072ff;
    background: #fff;
    outline: none;
}

/* BUTTONS */
button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    margin-top: 10px;
}

.login-btn {
    background: #0072ff;
    color: #fff;
    border: none;
}

.register-btn {
    background: transparent;
    border: 1px solid #ccc;
}

/* SPINNER */
.spinner {
    width: 16px;
    height: 16px;
    border: 2px solid transparent;
    border-top: 2px solid #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
    margin-left: 8px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* ERROR */
.error {
    color: red;
    font-size: 12px;
    display: none;
    margin-bottom: 10px;
}

/* ===================== */
/* SMALL TABLETS */
/* ===================== */
@media (min-width: 600px) {
    .hero {
        height: 200px;
    }
}

/* ===================== */
/* TABLET & DESKTOP */
/* ===================== */
@media (min-width: 768px) {
    body {
        flex-direction: row;
    }

    .hero {
        flex: 1.1;
        height: auto;
        min-height: 100%;
        min-width: 40%;
        max-width: 65%;
        display: flex;
    }

    .hero img {
        height: 100%;
    }

    .login-container {
        flex: 1;
        padding: 20px;
    }
}

/* ===================== */
/* 💡 MOBILE LANDSCAPE FIX */
/* ===================== */
@media (max-height: 500px) and (orientation: landscape) {
    body {
        flex-direction: row; /* switch to side layout */
    }

    .hero {
        flex: 1;
        height: auto;
        min-height: 100%;
    }

    .hero img {
        height: 100%;
    }

    .login-container {
        flex: 1;
        padding: 10px;
        align-items: center;
    }

    .login-box {
        padding: 20px;
        max-width: 280px;
    }

    input {
        padding: 10px;
    }

    button {
        padding: 10px;
    }
}

/* ===================== */
/* LARGE SCREENS */
/* ===================== */
@media (min-width: 1200px) {
    .hero {
        flex: 1.2;
    }
}
</style>
</head>

<body>

<div class="hero">
    <img src="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/Login+Page+Adecon+Banner2x+(1).png" alt="Adecon Banner">
</div>

<div class="login-container">
    <div class="login-box">

        <input type="email" id="email" placeholder="Enter email" />
        <div class="error" id="errorMsg"></div>

        <button class="login-btn" id="loginBtn" onclick="login()">
            <span id="btnText">Login</span>
            <span class="spinner" id="btnLoader"></span>
        </button>

        <button class="register-btn" onclick="location.href='https://adecon2026-registration.onrender.com/'">
            Register
        </button>

    </div>
</div>

<script>
// same JS (unchanged)
const email = document.getElementById('email');
const errorMsg = document.getElementById('errorMsg');
const loginBtn = document.getElementById('loginBtn');
const btnText = document.getElementById('btnText');
const btnLoader = document.getElementById('btnLoader');

window.onload = async () => {
if(localStorage.getItem("email")) {
           window.location.replace("home.html");
}
};

email.addEventListener("keypress", e => {
    if (e.key === "Enter") login();
});

async function login() {
    const emailVal = email.value.trim();

    if (!emailVal.includes('@')) {
        showError("Enter valid email");
        return;
    }

    errorMsg.style.display = 'none';
    toggleLoading(true);

    try {
        const res = await fetch("https://adecon-backend-8y4v.onrender.com/api/user/status", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email: emailVal }),
            credentials: "include"
        });

        const data = await res.json();

        // Check if user object exists in the response
        if (data?.message?.email) {
            const u = data.message;

            // ✅ Save user details for form pre-filling
            localStorage.setItem("email", u.email || "");
            localStorage.setItem("fullname", u.fullname || "");
            localStorage.setItem("mobileno", u.mobileno || "");
            localStorage.setItem("city", u.city || "");
            localStorage.setItem("state", u.state || "");
            localStorage.setItem("country", u.country || "");

            // ✅ Track Login Activity
            try {
                await fetch("https://adecon-backend-8y4v.onrender.com/api/user/activity", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email:localStorage.getItem('email'),loginTime: true }),
                    credentials: "include"
                });
                
                // Redirect after successful tracking
                location.href = "home.html";
            } catch (err) {
                console.error("Activity tracking failed", err);
                // Redirect anyway so the user isn't stuck
                location.href = "home.html";
            }
           
        } else {
            showError("Invalid User. Please register first.");
        }

    } catch (err) {
        showError("Server error. Please try again.");
    }

    toggleLoading(false);
}

function toggleLoading(state) {
    loginBtn.disabled = state;
    btnText.style.opacity = state ? "0.7" : "1";
    btnLoader.style.display = state ? "inline-block" : "none";
}

function showError(msg) {
    errorMsg.style.display = 'block';
    errorMsg.innerText = msg;
}
</script>

</body>
</html>
