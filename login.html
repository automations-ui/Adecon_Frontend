<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adecon 2026 - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    margin: 0;
    padding: 0;
    height: 100vh;
    width: 100vw;
    display: flex;
    overflow: hidden; /* Prevents unwanted scrollbars */
    background: #f4f7fb;
}

.hero {
    height: 100vh; /* Force height to match viewport */
    flex: 0 0 auto; 
    display: flex;
    align-items: center; /* Vertical alignment */
    justify-content: center; /* Horizontal alignment */
}

.hero img {
    height: 100%; /* Image fills full height of the container */
    width: auto;
    display: block; /* Removes any potential vertical whitespace caused by inline display */
    object-fit: cover; /* Ensures no white space inside the image container */
}

.login-container {
    flex: 1; /* Fills the rest of the screen */
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f4f7fb; /* Light grey background for the form side */
}

.login-box {
    width: 320px;
    padding: 40px 30px;
    border-radius: 16px;
    background: #fff;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    text-align: center;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #f9fbfd;
}

input:focus {
    border-color: #0072ff;
    background: #fff;
    outline: none;
}

/* BUTTONS */
button {
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    margin-top: 8px;
}

.login-btn {
    background: #0072ff;
    color: #fff;
    border: none;
}

.register-btn {
    background: transparent;
    border: 1px solid #ccc;
}

/* SPINNER */
.spinner {
    width: 16px;
    height: 16px;
    border: 2px solid transparent;
    border-top: 2px solid #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
    margin-left: 8px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* ERROR */
.error {
    color: red;
    font-size: 12px;
    display: none;
}

/* MOBILE */
@media (max-width: 900px) {
    body { 
        flex-direction: column; 
        overflow: auto; 
    }
    .hero {
        width: 100%;
        height: auto;
    }
    .hero img {
        width: 100%;
        height: auto;
    }
    .login-container {
        padding: 40px 20px;
    }
}
</style>
</head>

<body>

<div class="hero">
    <img src="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/Login+Page+Adecon+Banner%402x.png" alt="Adecon Banner">
</div>

<div class="login-container">
    <div class="login-box">

        <input type="email" id="email" placeholder="Enter email" />
        <div class="error" id="errorMsg"></div>

        <button class="login-btn" id="loginBtn" onclick="login()">
            <span id="btnText">Login</span>
            <span class="spinner" id="btnLoader"></span>
        </button>

        <button class="register-btn" onclick="location.href='https://adecon2026-registration.onrender.com/'">
            Register
        </button>

    </div>
</div>

<script>
// Grab elements globally for simplicity
const email = document.getElementById('email');
const errorMsg = document.getElementById('errorMsg');
const loginBtn = document.getElementById('loginBtn');
const btnText = document.getElementById('btnText');
const btnLoader = document.getElementById('btnLoader');

// Auto redirect if logged in
window.onload = async () => {
    try {
        const res = await fetch("https://adecon-backend-8y4v.onrender.com/api/auth/status", {
            credentials: "include"
        });

        const data = await res.json();
        if (data.message === "User authenticated") {
            location.href = "home.html";
        }
    } catch {}
};

// Enter key support
email.addEventListener("keypress", e => {
    if (e.key === "Enter") login();
});

async function login() {
    const emailVal = email.value.trim();

    if (!emailVal.includes('@')) {
        errorMsg.style.display = 'block';
        errorMsg.innerText = "Enter valid email";
        return;
    }

    errorMsg.style.display = 'none'; // Clear previous errors
    toggleLoading(true);

    try {
        const res = await fetch("https://adecon-backend-8y4v.onrender.com/api/user/status", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email: emailVal }),
            credentials: "include"
        });

        const data = await res.json();

        if (data?.message?.email) {
            const u = data.message;

            localStorage.setItem("email", u.email || "");
            localStorage.setItem("fullname", u.fullname || "");
            localStorage.setItem("mobileno", u.mobileno || "");
            localStorage.setItem("city", u.city || "");
            localStorage.setItem("state", u.state || "");
            localStorage.setItem("country", u.country || "");

            location.href = "home.html";
        } else {
            errorMsg.style.display = 'block';
            errorMsg.innerText = "Invalid User";
        }

    } catch {
        errorMsg.style.display = 'block';
        errorMsg.innerText = "Server error";
    }

    toggleLoading(false);
}

function toggleLoading(state) {
    loginBtn.disabled = state;
    btnText.style.opacity = state ? "0.7" : "1";
    btnLoader.style.display = state ? "inline-block" : "none";
}
</script>

</body>
</html>
