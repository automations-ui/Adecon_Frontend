<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adecon 2026 - USV Pharma Stall</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', Arial, sans-serif; }

html, body { 
    height: 100%; 
    width: 100%; 
    overflow: hidden; 
    background: #000;
    overscroll-behavior: none;
}

/* 🔐 Loader */
#authLoader {
    position: fixed; inset: 0;
    background: #0f172a;
    display: flex; justify-content: center; align-items: center;
    color: #fff; z-index: 9999;
}

.spinner {
    width: 40px; height: 40px;
    border: 4px solid rgba(255,255,255,0.1);
    border-top: 4px solid #38bdf8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 🔄 Portrait Warning */
#portraitWarning {
    position: fixed; inset: 0;
    background: #000; color: white;
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    z-index: 9998; text-align: center; padding: 20px;
}

/* 🖼️ Main Container */
.container {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh; /* Ensures the menu isn't hidden by mobile browser bars */
    background: #000;
}

.container img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: fill; /* Squashes to fit exactly, ensuring total visibility */
}

/* 📄 Modal */
.modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none; justify-content: center; align-items: center;
    z-index: 1000;
}
.modal-content {
    width: 90%; height: 85%;
    background: #fff; border-radius: 12px;
    overflow: hidden; position: relative;
}
.modal iframe { width: 100%; height: 100%; border: none; }
.close-btn {
    position: absolute; top: 10px; right: 15px;
    background: #ef4444; color: #fff; border: none;
    padding: 7px 10px; cursor: pointer; border-radius: 6px; font-weight: bold;
}

/* 📱 Footer Bar */
.footer-bar {
    position: fixed; bottom: 0; width: 100%;
    background: rgba(255,255,255,0.98);
    border-top: 1px solid #ddd;
    z-index: 20;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
}
.footer-bar.collapsed { transform: translateY(100%); }

.footer-toggle {
    position: absolute; top: -35px; left: 50%;
    transform: translateX(-50%);
    background: #2a4d7d; color: #fff;
    padding: 6px 20px; border-radius: 12px 12px 0 0;
    cursor: pointer; font-size: 13px; font-weight: 600;
}

.component-bar {
    display: flex; justify-content: space-around; padding: 12px 0 25px 0;
}
.component-item { text-align: center; cursor: pointer; flex: 1; color: #444; font-size: 11px; }
.component-item i { font-size: 22px; margin-bottom: 4px; color: #2a4d7d; }
</style>
</head>

<body>

<div id="authLoader">
    <div style="text-align:center;">
        <div class="spinner"></div>
        <p style="margin-top:10px; letter-spacing:1px; font-size:12px;">LOADING USV PHARMA...</p>
    </div>
</div>

<div id="portraitWarning">
    <div style="font-size: 40px; margin-bottom: 15px;">🔄</div>
    <p>Please rotate your device to Landscape mode.</p>
</div>

<div class="container" id="mainContainer">
    <img id="stall-image" src="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/OneDrive_1_3-27-2026/USV+Pharma.png" usemap="#stall-map">
</div>

<map name="stall-map">
    <area shape="rect" coords="100,100,400,400" href="#" onclick="openModal('usv-video.html'); return false;">
</map>

<div class="modal" id="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">✕ </button>
        <iframe id="frame"></iframe>
    </div>
</div>

<div class="footer-bar collapsed" id="footer">
    <div class="footer-toggle" id="toggle">Menu ▲</div>
    <div class="component-bar">
        <div class="component-item" onclick="location.href='home.html'"><i class="fa fa-house"></i><br>Lobby</div>
        <div class="component-item" onclick="location.href='auditorium.html'"><i class="fa fa-person-chalkboard"></i><br>Auditorium</div>
        <div class="component-item" onclick="location.href='exhibition.html'"><i class="fa fa-landmark"></i><br>Exhibition</div>
        <div class="component-item" onclick="openAsk()"><i class="fa fa-comment"></i><br>Ask</div>
        <div class="component-item" onclick="logout()"><i class="fa fa-right-from-bracket"></i><br>Logout</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>

<script>
/* 🔐 Auth & Tracking */
async function checkAuth(){
    if(localStorage.getItem("email")) {
            document.getElementById("authLoader").style.display="none";
            trackVisit("USV");
            return true;
        }
else{
    location.href="login.html";
}
}

function trackVisit(name) {
    fetch("https://adecon-backend-8y4v.onrender.com/api/user/activity", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ email:localStorage.getItem('email'),stall: name })
    }).catch(() => {});
}

/* 📱 Responsive Logic */
function handleOrientation() {
    const isPortrait = window.innerHeight > window.innerWidth;
    document.getElementById("portraitWarning").style.display = isPortrait ? "flex" : "none";
    document.getElementById("mainContainer").style.visibility = isPortrait ? "hidden" : "visible";
    if(!isPortrait && window.imageMapResize) setTimeout(imageMapResize, 200);
}

/* 📄 Modal Functions */
function openModal(url){
    document.getElementById("frame").src = url;
    document.getElementById("modal").style.display = "flex";
}
function closeModal(){
    document.getElementById("modal").style.display = "none";
    document.getElementById("frame").src = "";
}

function openAsk(){
    const encode = k => encodeURIComponent(localStorage.getItem(k) || "");
    const url = `https://docs.google.com/forms/d/e/1FAIpQLSfe6pbQgIeUB9IuiiJ-vq6xpTIcpMSxiOIyhk8MI-2H8RbjYw/viewform?usp=pp_url&entry.543970567=${encode("fullname")}&entry.385469749=&entry.57364819=${encode("mobileno")}&entry.880130637=${encode("email")}&entry.342698872=${encode("city")}&entry.745321921=${encode("state")}&entry.1903990537=${encode("country")}`;
    openModal(url);
}

/* 🧠 Init */
document.addEventListener("DOMContentLoaded", async () => {
    await checkAuth();

    const footer = document.getElementById("footer");
    const toggle = document.getElementById("toggle");
    toggle.onclick = () => {
        footer.classList.toggle("collapsed");
        toggle.textContent = footer.classList.contains("collapsed") ? "Menu ▲" : "Menu ▼";
    };

    handleOrientation();
    window.addEventListener("resize", () => { if(window.imageMapResize) imageMapResize(); });
    window.addEventListener("orientationchange", () => setTimeout(handleOrientation, 300));
});

async function logout(){
    localStorage.clear();
    location.href="login.html";
}

window.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
</script>

</body>
</html>
