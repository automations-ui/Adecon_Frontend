<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exhibition</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html { width:100%; height:100%; overflow:hidden; font-family: Arial, sans-serif; position: relative; }

    .container { width:100%; height:100vh; position: relative; }

    .container img {
        width:100%;
        height:100%;
        object-fit: cover;
        display:block;
    }

    /* Footer image styling */
    .footer-container {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
    }

    .footer-container img {
        max-width:700px;
        width:100%;
        height:50px;
        display:block;
    }

    /* 🔴 Blinking Red Dot */
    .red-dot {
        position: absolute;
        width: 14px;
        height: 14px;
        background-color: red;
        border-radius: 50%;
        z-index: 10;
        pointer-events: none;
        animation: blink 1s infinite;
    }

    @keyframes blink {
        0% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.2; transform: scale(1.5); }
        100% { opacity: 1; transform: scale(1); }
    }
</style>
</head>

<body>

<div class="container">
    <!-- Main Exhibition Image -->
    <img src="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/exhibition.png" usemap="#image-map" id="exhibitionImg">

    <map name="image-map">
        <area href="stall.html" coords="628,375,908,630" shape="rect">
    </map>

    <!-- 🔴 Red Dot -->
    <div class="red-dot"></div>

    <!-- Footer Image -->
    <div class="footer-container">
        <img src="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/footer.jpg" usemap="#footer-map" alt="Footer" id="footerImage">
        <map name="footer-map">
            <area coords="7,15,117,163" href="home.html" shape="rect">
            <area coords="250,10,433,160" href="auditorium_live.html" shape="rect">
            <area coords="525,11,701,162" href="exhibition.html" shape="rect">
            <area coords="734,6,994,161" href="https://docs.google.com/forms/" target="_blank" shape="rect">
            <area coords="1039,6,1182,164" href="#" id="logoutArea" shape="rect">
        </map>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>
<script>
window.onload = function() {
    const loginStatus = localStorage.getItem('_loginS');
    if (loginStatus !== '_ltorguien') {
        window.location.href = "login.html";
        return;
    }

    // Make image maps responsive
    imageMapResize();

    // Logout
    const logoutArea = document.getElementById('logoutArea');
    logoutArea.addEventListener('click', function(e){
        e.preventDefault();
        localStorage.removeItem('_loginS');
        window.location.href = "login.html";
    });

    // 🔴 Red Dot Logic
    const dot = document.querySelector('.red-dot');
    const img = document.getElementById('exhibitionImg');

    const coords = [628,375,908,630];
    const centerX = (coords[0] + coords[2]) / 2;
    const centerY = (coords[1] + coords[3]) / 2;

    function positionDot() {
        const rect = img.getBoundingClientRect();

        const scaleX = rect.width / img.naturalWidth;
        const scaleY = rect.height / img.naturalHeight;

        dot.style.left = (rect.left + centerX * scaleX - 7) + 'px';
        dot.style.top = (rect.top + centerY * scaleY - 7) + 'px';
    }

    // Ensure image is loaded before positioning
    if (img.complete) {
        positionDot();
    } else {
        img.onload = positionDot;
    }

    window.addEventListener('resize', positionDot);
};
</script>

</body>
</html>
