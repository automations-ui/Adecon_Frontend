<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exhibition</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; overflow: hidden; }

/* 🔐 Loader */
#authLoader {
  position:fixed;
  inset:0;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  color:white;
}

.spinner {
  width:50px;
  height:50px;
  border:5px solid rgba(255,255,255,0.2);
  border-top:5px solid #38bdf8;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Main */
.container {
  position: relative;
  width: 100vw;
  height: 100vh;
}

.container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Modal */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.modal-content {
  width:85%;
  height:85%;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  position:relative;
}

.modal-content iframe {
  width:100%;
  height:100%;
  border:none;
}

.close-btn {
  position:absolute;
  top:10px;
  right:15px;
  background:red;
  color:#fff;
  border:none;
  padding:6px 12px;
  cursor:pointer;
}

/* Footer */
.footer-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(255,255,255,0.95);
  border-top: 1px solid #ddd;
  z-index: 20;
  transition: transform 0.3s ease-in-out;
}
.footer-bar.collapsed { transform: translateY(90%); }

.footer-toggle {
  position: absolute;
  top: -32px;
  left: 51%;
  transform: translateX(-50%);
  background: #2a4d7d;
  color: white;
  padding: 6px 16px;
  border-radius: 12px 12px 0 0;
  cursor: pointer;
  font-weight: 600;
}

.component-bar {
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.component-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  color: #333;
}

.component-item i { font-size: 26px; margin-bottom: 5px; }
</style>
</head>

<body>

<!-- 🔐 Loader -->
<div id="authLoader">
  <div style="text-align:center;">
    <div class="spinner"></div>
    <p>Authenticating...</p>
  </div>
</div>

<!-- 🌐 Main -->
<div class="container">
  <img src="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/2+stall+Design.png" usemap="#image-map">

  <map name="image-map">
    <area href="stall1.html" coords="51,350,888,960" shape="rect">
    <area href="stall2.html" coords="1017,350,1863,960" shape="rect">
  </map>
</div>

<!-- 📄 Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">✖</button>
    <iframe id="modalFrame"></iframe>
  </div>
</div>

<!-- Footer -->
<div class="footer-bar collapsed" id="footerBar">
  <div class="footer-toggle" id="footerToggle">Menu ▲</div>

  <div class="component-bar">
    <div class="component-item" id="goLobby">
      <i class="fa-solid fa-house"></i>Lobby
    </div>

    <div class="component-item" id="goAud">
      <i class="fa-solid fa-person-chalkboard"></i>Auditorium
    </div>

    <div class="component-item" id="goEx">
      <i class="fa-solid fa-landmark"></i>Exhibition
    </div>

    <div class="component-item" id="askBtn">
      <i class="fa-regular fa-comment"></i>Ask
    </div>

    <div class="component-item" id="logout">
      <i class="fa-solid fa-arrow-right-from-bracket"></i>Logout
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>

<script>

/* 🔐 AUTH */
async function checkAuth() {
  try {
    const res = await fetch("https://adecon-backend-8y4v.onrender.com/api/auth/status", {
      credentials: "include"
    });

    const data = await res.json();

    if (data.message === "User authenticated") {
      document.getElementById("authLoader").style.display = "none";
      return true;
    } else {
      window.location.href = "login.html";
    }
  } catch {
    window.location.href = "login.html";
  }
}

/* 📄 Modal */
function openModal(url) {
  document.getElementById("modalFrame").src = url;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("modalFrame").src = "";
}

/* 🧠 Prefilled Google Form */
function buildPrefilledFormURL() {
  const base = "https://docs.google.com/forms/d/e/1FAIpQLSfe6pbQgIeUB9IuiiJ-vq6xpTIcpMSxiOIyhk8MI-2H8RbjYw/viewform";

  const params = new URLSearchParams({
    "entry.543970567": localStorage.getItem("fullname") || "",
    "entry.385469749": "",
    "entry.57364819": localStorage.getItem("mobileno") || "",
    "entry.880130637": localStorage.getItem("email") || "",
    "entry.342698872": localStorage.getItem("city") || "",
    "entry.745321921": localStorage.getItem("state") || "",
    "entry.1903990537": localStorage.getItem("country") || ""
  });

  return `${base}?${params.toString()}`;
}

/* INIT */
document.addEventListener("DOMContentLoaded", async () => {
  const ok = await checkAuth();
  if (!ok) return;

  imageMapResize();
  setupFooter();
});

/* Footer */
function setupFooter() {
  const footer = document.getElementById('footerBar');
  const toggle = document.getElementById('footerToggle');

  toggle.onclick = () => {
    footer.classList.toggle('collapsed');
    toggle.textContent = footer.classList.contains('collapsed') ? "Menu ▲" : "Menu ▼";
  };

  document.getElementById("askBtn").onclick = () => {
    const url = buildPrefilledFormURL();
    openModal(url);
  };

  document.getElementById("goLobby").onclick = () => location.href = "home.html";
  document.getElementById("goAud").onclick = () => location.href = "auditorium.html";
  document.getElementById("goEx").onclick = () => location.href = "exhibition.html";

document.getElementById("logout").onclick = async () => {
  try {
    await fetch("https://adecon-backend-8y4v.onrender.com/api/auth/logout", {
      method: "POST",
      credentials: "include"
    });
    
  localStorage.clear();

  window.location.href = "login.html";
  } catch (err) {
  }

};
}

/* ESC close */
window.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

</script>

</body>
</html>
